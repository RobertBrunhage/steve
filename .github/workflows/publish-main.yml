name: Publish Main Images

on:
  push:
    branches: [main]
    paths-ignore:
      - README.md
      - assets/**
      - LICENSE

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Compute image names
        id: image
        run: |
          owner=$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          echo "kellix=${{ env.REGISTRY }}/${owner}/kellix" >> "$GITHUB_OUTPUT"
          echo "opencode=${{ env.REGISTRY }}/${owner}/kellix-opencode" >> "$GITHUB_OUTPUT"

      - name: Compute short sha
        id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push kellix
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.kellix }}:main
            ${{ steps.image.outputs.kellix }}:sha-${{ steps.vars.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push kellix-opencode
        uses: docker/build-push-action@v6
        with:
          context: .
          file: opencode.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.opencode }}:main
            ${{ steps.image.outputs.opencode }}:sha-${{ steps.vars.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
