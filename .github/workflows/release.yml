name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version tag to release (for example v0.1.0)
        required: true
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version
        id: version
        run: |
          version="${{ inputs.version }}"
          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must look like v0.1.0" >&2
            exit 1
          fi
          if git ls-remote --tags origin "refs/tags/$version" | grep -q .; then
            echo "Tag $version already exists" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "minor=${version%.*}" >> "$GITHUB_OUTPUT"

      - name: Create local tag
        run: git tag "${{ steps.version.outputs.version }}"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push steve
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}:${{ steps.version.outputs.minor }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push steve-opencode
        uses: docker/build-push-action@v6
        with:
          context: .
          file: opencode.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}-opencode:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}-opencode:${{ steps.version.outputs.minor }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push tag
        run: git push origin "${{ steps.version.outputs.version }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ steps.version.outputs.version }}" --target "$GITHUB_SHA" --title "${{ steps.version.outputs.version }}" --generate-notes
