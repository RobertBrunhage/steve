name: Create Release

on:
  workflow_dispatch:
    inputs:
      date:
        description: Release date (for example 2026.4.1)
        required: true
        type: string
      prerelease:
        description: Checked = create a beta prerelease like 2026.4.1-beta.1
        required: true
        default: true
        type: boolean

env:
  REGISTRY: ghcr.io

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute image names
        id: image
        run: |
          repo=$(printf '%s' "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')
          echo "steve=${{ env.REGISTRY }}/$repo" >> "$GITHUB_OUTPUT"
          echo "opencode=${{ env.REGISTRY }}/${repo}-opencode" >> "$GITHUB_OUTPUT"

      - name: Validate release tag
        id: version
        run: |
          release_date="${{ inputs.date }}"
          if [[ ! "$release_date" =~ ^[0-9]{4}\.[1-9][0-9]*\.[1-9][0-9]*$ ]]; then
            echo "Release date must look like 2026.4.1" >&2
            exit 1
          fi
          version="v${release_date}"
          if [[ "${{ inputs.prerelease }}" == "true" ]]; then
            version="${version}-beta.1"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          if git ls-remote --tags origin "refs/tags/$version" | grep -q .; then
            echo "Tag $version already exists" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "release_name=Steve ${version#v}" >> "$GITHUB_OUTPUT"

      - name: Create local tag
        run: git tag "${{ steps.version.outputs.version }}"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push steve
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.steve }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push steve-opencode
        uses: docker/build-push-action@v6
        with:
          context: .
          file: opencode.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.opencode }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push tag
        run: git push origin "${{ steps.version.outputs.version }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          args=(
            release create "${{ steps.version.outputs.version }}"
            --target "$GITHUB_SHA"
            --title "${{ steps.version.outputs.release_name }}"
            --generate-notes
          )
          if [[ "${{ steps.version.outputs.prerelease }}" == "true" ]]; then
            args+=(--prerelease)
          fi
          gh "${args[@]}"
