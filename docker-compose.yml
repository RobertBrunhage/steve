services:
  steve:
    image: ghcr.io/robertbrunhage/steve:latest
    container_name: steve
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - steve-data:/data
      - steve-vault:/vault
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - STEVE_HOST_IP=${STEVE_HOST_IP:-localhost}
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    networks: [steve-net]

volumes:
  steve-data:
  steve-vault:

networks:
  steve-net:
    driver: bridge
