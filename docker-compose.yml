services:
  kellix:
    image: ${KELLIX_IMAGE:-ghcr.io/robertbrunhage/kellix:main}
    restart: unless-stopped
    ports:
      - "${KELLIX_WEB_PORT:-7838}:${KELLIX_WEB_PORT:-7838}"
      - "${KELLIX_BROWSER_VIEWER_PORT_BASE:-6080}-${KELLIX_BROWSER_VIEWER_PORT_MAX:-6119}:${KELLIX_BROWSER_VIEWER_PORT_BASE:-6080}-${KELLIX_BROWSER_VIEWER_PORT_MAX:-6119}"
    volumes:
      - kellix-data:/data
      - kellix-vault:/vault
      - ${KELLIX_STATE_DIR_HOST:-.}:/state
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - KELLIX_HOSTNAME=${KELLIX_HOSTNAME:-localhost}
      - KELLIX_OPENCODE_IMAGE=${KELLIX_OPENCODE_IMAGE:-ghcr.io/robertbrunhage/kellix-opencode:main}
      - KELLIX_VERSION=${KELLIX_VERSION:-dev}
      - KELLIX_PROJECT=${KELLIX_PROJECT:-kellix}
      - KELLIX_STATE_DIR=/state
      - KELLIX_WEB_PORT=${KELLIX_WEB_PORT:-7838}
      - KELLIX_OPENCODE_PORT_BASE=${KELLIX_OPENCODE_PORT_BASE:-3456}
      - KELLIX_BROWSER_VIEWER_PORT_BASE=${KELLIX_BROWSER_VIEWER_PORT_BASE:-6080}
      - KELLIX_BROWSER_VIEWER_PORT_MAX=${KELLIX_BROWSER_VIEWER_PORT_MAX:-6119}
      - KELLIX_BROWSER_VNC_PORT_BASE=${KELLIX_BROWSER_VNC_PORT_BASE:-5901}
      - KELLIX_BROWSER_DISPLAY_BASE=${KELLIX_BROWSER_DISPLAY_BASE:-90}
      - KELLIX_REMOTE_BROWSER_URL=${KELLIX_REMOTE_BROWSER_URL:-}
      - KELLIX_TELEGRAM_API_BASE=${KELLIX_TELEGRAM_API_BASE:-https://api.telegram.org}
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [kellix-net]

volumes:
  kellix-data:
    name: ${KELLIX_PROJECT:-kellix}_kellix-data
  kellix-vault:
    name: ${KELLIX_PROJECT:-kellix}_kellix-vault

networks:
  kellix-net:
    name: ${KELLIX_PROJECT:-kellix}_kellix-net
    driver: bridge
