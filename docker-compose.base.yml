services:
  steve:
    build: .
    container_name: steve
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "3000:3000"
    volumes:
      - ${STEVE_DATA:-~/.steve}:/data
      - steve-vault:/vault
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - STEVE_DOCKER=1
      - STEVE_VAULT_KEY=${STEVE_VAULT_KEY:-}
      - STEVE_HOST_IP=${STEVE_HOST_IP:-localhost}
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    networks: [steve-net]

volumes:
  steve-vault:
  opencode-auth:

networks:
  steve-net:
    driver: bridge
